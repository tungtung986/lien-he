<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liên Hệ Cày Thuê</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{

    background:linear-gradient(-45deg,#050505,#0d0d0d,#00151f,#001d2b);
    background-size:400% 400%;
    animation:bg 12s ease infinite;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    min-height:100vh;

    overflow-y:auto;
    overflow-x:hidden;

    padding:40px 0;

}

/* Thanh cuộn */

body::-webkit-scrollbar{
    width:10px;
}

body::-webkit-scrollbar-track{
    background:#111;
}

body::-webkit-scrollbar-thumb{
    background:cyan;
    border-radius:20px;
}

body::-webkit-scrollbar-thumb:hover{
    background:#00bfff;
}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

    width:90%;
    max-width:760px;

    margin:40px 0;

    background:rgba(20,20,20,.85);

    backdrop-filter:blur(8px);

    border:2px solid #00c8ff;

    border-radius:25px;

    padding:45px;

    text-align:center;

    box-shadow:
    0 0 15px #00c8ff,
    0 0 35px #00c8ff55,
    0 0 80px #00c8ff33;

    animation:borderGlow 3s infinite alternate;

}

@keyframes borderGlow{

from{

box-shadow:
0 0 15px #00c8ff,
0 0 35px #00c8ff55;

}

to{

box-shadow:
0 0 25px cyan,
0 0 60px cyan,
0 0 100px cyan;

}

}

.logo{

font-size:70px;
color:#00c8ff;

margin-bottom:15px;

animation:spin 12s linear infinite;

text-shadow:0 0 25px cyan;

}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

h1{

font-size:42px;
margin-bottom:10px;
color:white;

text-shadow:0 0 15px cyan;

}

.subtitle{

font-size:23px;
color:#cfcfcf;
margin-bottom:25px;

}

.text{

font-size:18px;
line-height:1.9;
color:#ededed;

}

.social{

margin-top:40px;

display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;

}

.social a{

width:75px;
height:75px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:34px;

text-decoration:none;

transition:.35s;

}

.facebook{

background:#1877F2;
color:white;

}

.facebook:hover{

transform:translateY(-8px) scale(1.1);

box-shadow:
0 0 20px #1877F2,
0 0 45px #1877F2;

}

/* STYLE CHO DISCORD */
.discord{

background:#5865F2;
color:white;

}

.discord:hover{

transform:translateY(-8px) scale(1.1);

box-shadow:
0 0 20px #5865F2,
0 0 45px #5865F2;

}

.youtube{

margin-top:40px;

}

.youtube a{

display:inline-flex;

align-items:center;

gap:12px;

padding:18px 35px;

background:red;

color:white;

text-decoration:none;

border-radius:12px;

font-size:22px;

font-weight:bold;

transition:.35s;

}

.youtube a:hover{

transform:scale(1.08);

box-shadow:
0 0 20px red,
0 0 40px red,
0 0 70px red;

}

.footer{

margin-top:40px;

font-size:18px;

color:#8edcff;

text-shadow:0 0 15px cyan;

}

@media(max-width:600px){

.container{

padding:30px 20px;

}

.logo{

font-size:55px;

}

h1{

font-size:32px;

}

.subtitle{

font-size:18px;

}

.text{

font-size:16px;

}

.youtube a{

font-size:18px;

padding:15px 25px;

}

}

/* =======================================================
   PHẦN CSS THÊM MỚI CHO LOADING VÀ KIỂM TRA VPN
   ======================================================= */
#loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    padding: 20px;
}

#loading-text {
    font-size: 22px;
    margin-bottom: 20px;
    text-align: center;
    text-shadow: 0 0 10px rgba(0, 200, 255, 0.5);
    font-weight: 500;
}

.progress-container {
    width: 80%;
    max-width: 400px;
    background: #222;
    border-radius: 20px;
    padding: 4px;
    border: 1px solid #00c8ff;
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
}

.progress-bar {
    width: 1%;
    height: 20px;
    background: linear-gradient(90deg, #00c8ff, cyan);
    border-radius: 20px;
    box-shadow: 0 0 10px cyan;
    transition: width 0.1s linear;
}

#percentage {
    margin-top: 15px;
    font-size: 24px;
    font-weight: bold;
    color: cyan;
    text-shadow: 0 0 10px cyan;
}

/* Thống báo đẩy VPN ẩn mặc định */
#vpn-alert {
    display: none;
    background: rgba(255, 0, 0, 0.2);
    border: 2px solid red;
    padding: 15px;
    border-radius: 12px;
    color: #ff4d4d;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 25px;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    animation: flash 1.5s infinite alternate;
}

@keyframes flash {
    from { box-shadow: 0 0 5px red; }
    to { box-shadow: 0 0 20px red; }
}

/* =======================================================
   CSS CHO HIỆU ỨNG HOA LÁ RƠI (BẢN UPDATE NÂNG CẤP ĐẸP NHƯ VIDEO)
   ======================================================= */
.leaf-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; 
    z-index: 9999; 
    overflow: hidden;
    perspective: 1000px; /* Tạo không gian 3D giúp lá xoay chân thực */
}

.leaf {
    position: absolute;
    top: -50px;
    background-size: contain;
    background-repeat: no-repeat;
    user-select: none;
    pointer-events: none;
    will-change: transform, opacity;
    animation: fallAndSway linear infinite;
    filter: drop-shadow(0 0 4px rgba(0, 200, 255, 0.3)); /* Thêm chút hiệu ứng ánh sáng nhẹ hợp tone màu web */
}

/* Hiệu ứng chuyển động phức hợp: vừa rơi xuống, vừa lắc lư trái phải, vừa xoay lật 3D */
@keyframes fallAndSway {
    0% {
        transform: translateY(0) translateX(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
        opacity: 0;
    }
    10% {
        opacity: 0.9;
    }
    90% {
        opacity: 0.9;
    }
    100% {
        transform: translateY(105vh) translateX(180px) rotateX(360deg) rotateY(720deg) rotateZ(360deg);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="leaf-container" id="leaf-container"></div>

<div id="loading-overlay">
    <div id="loading-text">Chúng tôi đang kiểm tra bảo mật</div>
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="percentage">1%</div>
</div>

<div class="container">

<div id="vpn-alert">
    <i class="fas fa-exclamation-triangle"></i> Cậu yêu ơi hãy tắt VPN đi nhé
</div>

<div class="logo">
<i class="fas fa-cube"></i>
</div>

<h1>Liên Hệ Cày Thuê</h1>

<div class="subtitle">
Vui lòng đọc
</div>

<div class="text">

Chúng tôi sẽ không bán bất kỳ sản phẩm huy hiệu nào trong game <b>Roblox</b>.

<br><br>

Liên hệ cày thuê <b>Blox Fruits</b> và một số game nổi tiếng khác.

<br><br>

<b>Hỗ trợ 24/7 (Trừ buổi tối)</b>

</div>

<div class="social">

<a class="facebook"
href="https://web.facebook.com/profile.php?id=61587576273465&locale=vi_VN"
target="_blank">

<i class="fab fa-facebook-f"></i>

</a>

<a class="discord"
href="https://discord.gg/UYQBYXNU8M"
target="_blank">

<i class="fab fa-discord"></i>

</a>

</div>

<div class="youtube">

<a href="https://www.youtube.com/@garoblox2" target="_blank">

<i class="fab fa-youtube"></i>

Đăng ký

</a>

</div>

<div class="footer">

@🐔 Gà Roblox

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let count = 1;
    const progressBar = document.getElementById("progress-bar");
    const percentageText = document.getElementById("percentage");
    const loadingOverlay = document.getElementById("loading-overlay");
    const vpnAlert = document.getElementById("vpn-alert");

    // 1. Kiểm tra VPN dựa trên lệch múi giờ (Việt Nam là GMT+7 tức -420 phút)
    const offset = new Date().getTimezoneOffset();
    let isVPN = false;
    
    if (offset !== -420) { 
        isVPN = true;
    }

    // 2. Chạy thanh loading từ 1% -> 100%
    const loadingInterval = setInterval(() => {
        count++;
        progressBar.style.width = count + "%";
        percentageText.innerText = count + "%";

        if (count >= 100) {
            clearInterval(loadingInterval);
            
            // Ẩn màn hình loading đi
            loadingOverlay.style.display = "none";
            
            // Nếu phát hiện có sử dụng VPN thì cho hiển thị dòng chữ cảnh báo
            if (isVPN) {
                vpnAlert.style.display = "block";
            }
        }
    }, 30); 

    // 3. TỰ ĐỘNG TẠO HIỆU ỨNG HOA LÁ RƠI ĐỒNG HÌNH ẢNH 3D (BẢN CẢI TIẾN)
    const leafContainer = document.getElementById("leaf-container");
    
    // Sử dụng các hình ảnh đồ họa SVG cực kỳ sắc nét (gồm cánh hoa anh đào hồng ngọt ngào và lá xanh neon rực rỡ hợp màu web)
    const leafImages = [
        "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffb7c5'><path d='M12 2C12 2 6 8 6 13C6 16.3 8.7 19 12 19C15.3 19 18 16.3 18 13C18 8 12 2 12 2Z'/></svg>", // Cánh hoa anh đào 1
        "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff6b8b'><path d='M12 3c-1.2 0-2.4.6-3.2 1.7C8 3.6 6.8 3 5.6 3 3.1 3 1 5.1 1 7.6c0 4.6 5.3 8.2 11 13.4 5.7-5.2 11-8.8 11-13.4C23 5.1 20.9 3 18.4 3c-1.2 0-2.4.6-3.2 1.7C14.4 3.6 13.2 3 12 3z'/></svg>", // Cánh hoa hình tim lãng mạn
        "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ffff'><path d='M17 3H21v4c0 5.52-4.48 10-10 10H7v-4c0-5.52 4.48-10 10-10z'/></svg>", // Lá cây màu xanh Cyan đồng bộ giao diện
        "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a2f3ff'><path d='M12 2s-8 4.5-8 10c0 4.4 3.6 8 8 8s8-3.6 8-8c0-5.5-8-10-8-10z'/></svg>" // Cánh hoa mỏng màu xanh ngọc dạ quang
    ]; 

    function createLeaf() {
        const leaf = document.createElement("div");
        leaf.className = "leaf";
        
        // Lấy ngẫu nhiên hình ảnh đồ họa từ danh sách
        const randomImage = leafImages[Math.floor(Math.random() * leafImages.length)];
        leaf.style.backgroundImage = `url("${randomImage}")`;
        
        // Cấu hình ngẫu nhiên vị trí xuất phát, kích thước ảnh (từ 15px đến 30px)
        leaf.style.left = Math.random() * 100 + "vw";
        const size = Math.random() * 15 + 15; 
        leaf.style.width = size + "px";
        leaf.style.height = size + "px";
        
        // Tốc độ rơi ngẫu nhiên biến thiên tạo chiều sâu (ảnh gần rơi nhanh, ảnh xa rơi chậm)
        const duration = Math.random() * 5 + 4; // Rơi từ 4 giây đến 9 giây
        leaf.style.animationDuration = duration + "s";
        
        // Trì hoãn thời gian rơi ngẫu nhiên để các cánh hoa không xuất phát cùng một lúc
        leaf.style.animationDelay = Math.random() * 2 + "s";
        
        leafContainer.appendChild(leaf);
        
        // Tự động giải phóng bộ nhớ sau khi ảnh rơi khuất màn hình
        setTimeout(() => {
            leaf.remove();
        }, (duration + 2) * 1000);
    }

    // Tăng mật độ sinh cánh hoa để nhìn dày dặn và nghệ thuật giống video (mỗi 200ms tạo 1 cánh mới)
    setInterval(createLeaf, 200);
});
</script>

</body>
</html>
